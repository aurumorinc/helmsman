---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: oauth
    creationPolicy: Owner
  data:
    - secretKey: google-oauth-client-id
      remoteRef:
