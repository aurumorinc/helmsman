apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: password
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: password
    creationPolicy: Owner
  data:
    - secretKey: database-password
      remoteRef:
        key: DATABASE_PASSWORD
    - secretKey: smtp-password
      remoteRef:
        key: SMTP_PASSWORD
        
---
apiVersion: external-secrets.io/v1
