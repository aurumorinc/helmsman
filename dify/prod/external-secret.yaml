apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: password
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: password
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: DB_PASSWORD
    - secretKey: smtp-password
      remoteRef:
        key: SMTP_PASSWORD
        
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: SECRET_KEY
    - secretKey: s3-access-key
      remoteRef:
        key: S3_ACCESS_KEY
    - secretKey: s3-secret-key
      remoteRef:
        key: S3_SECRET_KEY
    - secretKey: google-storage-service-account-json-base64
      remoteRef:
        key: GOOGLE_STORAGE_SERVICE_ACCOUNT_JSON_BASE64

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: token
    creationPolicy: Owner
  data:
    - secretKey: plugin-action
      remoteRef:
        key: PLUGIN_ACTION

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dify-image-repo-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: dify-image-repo-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"aquiveal","password":"{{ .token }}","auth":"{{ printf "aquiveal:%s" .token | b64enc }}"}}}
        config.json: |
          {"auths":{"ghcr.io":{"username":"aquiveal","password":"{{ .token }}","auth":"{{ printf "aquiveal:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: PLUGIN_ACTION