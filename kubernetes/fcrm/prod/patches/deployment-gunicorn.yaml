apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcrm-gunicorn
  namespace: fcrm
spec:
  template:
    spec:
      containers:
        - name: gunicorn
          livenessProbe:
            tcpSocket: null
            httpGet:
              path: /api/method/ping
              port: 8000
              httpHeaders:
                - name: Host
                  value: fcrm.capybaara.com
            initialDelaySeconds: 30
            timeoutSeconds: 240
            periodSeconds: 240
          readinessProbe:
            tcpSocket: null
            httpGet:
              path: /api/method/ping
              port: 8000
              httpHeaders:
                - name: Host
                  value: fcrm.capybaara.com
            initialDelaySeconds: 30
            timeoutSeconds: 240
            periodSeconds: 240
