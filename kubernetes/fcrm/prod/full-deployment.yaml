apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/instance: fcrm
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: erpnext
    app.kubernetes.io/version: v15.93.0
    helm.sh/chart: erpnext-8.0.10
  name: fcrm-new-site-20251226175901
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - |
          set -x;
          bench_output=$(bench new-site ${SITE_NAME} \

            --no-mariadb-socket \
            --db-type=${DB_TYPE} \
            --db-host=${DB_HOST} \
            --db-port=${DB_PORT} \
            --admin-password=${ADMIN_PASSWORD} \
            --mariadb-root-username=${DB_ROOT_USER} \
            --mariadb-root-password=${DB_ROOT_PASSWORD} \
            --install-app=crm \
           | tee /dev/stderr);

          bench_exit_status=$?;
          if [ $bench_exit_status -ne 0 ]; then

              # Don't consider the case "site already exists" an error.
              if [[ $bench_output == *"already exists"* ]]; then
                  echo "Site already exists, continuing...";
              else
                  echo "An error occurred in bench new-site: $bench_output"
                  exit $bench_exit_status;
              fi
          fi
          set -e;
          rm -f currentsite.txt
        command:
        - bash
        - -c
        env:
        - name: SITE_NAME
          value: fcrm.capybaara.com
        - name: DB_TYPE
          value: mariadb
        - name: DB_HOST
          value: maxscale.fcrm.svc.cluster.local
        - name: DB_PORT
          value: "3306"
        - name: DB_ROOT_USER
          value: fcrm
        - name: DB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: fcrm-user-password
              name: password
        - name: ADMIN_PASSWORD
          value: Catcall3-Sample-Slighting
        image: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/fcrm:1.57.0-rc2
        imagePullPolicy: Always
        name: create-site
        resources: {}
        securityContext:
          capabilities:
            add:
            - CHOWN
        volumeMounts:
        - mountPath: /home/frappe/frappe-bench/sites
          name: sites-dir
        - mountPath: /home/frappe/frappe-bench/logs
          name: logs
      initContainers:
      - args:
        - |
          export start=`date +%s`; until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \

            [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
            [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
          do

            echo "Waiting for sites/common_site_config.json to be created";
            sleep 5;
            if (( `date +%s`-start > 600 )); then
              echo "could not find sites/common_site_config.json with required keys";
              exit 1
            fi
          done; echo "sites/common_site_config.json found";
          echo "Waiting for database to be reachable..."; wait-for-it -t 180 $(DB_HOST):$(DB_PORT); echo "Database is reachable.";
        command:
        - bash
        - -c
        env:
        - name: DB_HOST
          value: maxscale.fcrm.svc.cluster.local
        - name: DB_PORT
          value: "3306"
        image: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/fcrm:1.57.0-rc2
        imagePullPolicy: Always
        name: validate-config
        resources: {}
        securityContext:
          capabilities:
            add:
            - CHOWN
        volumeMounts:
        - mountPath: /home/frappe/frappe-bench/sites
          name: sites-dir
      restartPolicy: Never
      securityContext:
        supplementalGroups:
        - 1000
      serviceAccountName: fcrm
      volumes:
      - name: sites-dir
        persistentVolumeClaim:
          claimName: sites
          readOnly: false
      - emptyDir: {}
        name: logs
