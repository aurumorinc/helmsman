          initialDelaySeconds: 30
          periodSeconds: 240
          timeoutSeconds: 240
        resources: {}
        securityContext:
          capabilities:
            add:
            - CHOWN
        volumeMounts:
        - mountPath: /home/frappe/frappe-bench/sites
          name: sites-dir
        - mountPath: /home/frappe/frappe-bench/logs
          name: logs
