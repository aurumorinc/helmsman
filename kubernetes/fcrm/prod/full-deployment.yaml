apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/instance: fcrm
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: erpnext
    app.kubernetes.io/version: v15.93.0
    helm.sh/chart: erpnext-8.0.10
  name: fcrm-conf-bench-20251226175901
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - |
          ls -1 apps > sites/apps.txt; [[ -f sites/common_site_config.json ]] || echo "{}" > sites/common_site_config.json; bench set-config -gp db_port $DB_PORT; bench set-config -g db_host $DB_HOST; bench set-config -g redis_cache $REDIS_CACHE; bench set-config -g redis_queue $REDIS_QUEUE; bench set-config -g redis_socketio $REDIS_QUEUE; bench set-config -gp socketio_port $SOCKETIO_PORT;
        command:
        - bash
        - -c
        env:
        - name: DB_HOST
          value: maxscale.fcrm.svc.cluster.local
        - name: DB_PORT
          value: "3306"
        - name: REDIS_CACHE
          value: redis://10.160.0.33:6379
        - name: REDIS_QUEUE
          value: redis://10.160.0.15:6379
        - name: SOCKETIO_PORT
          value: "9000"
        image: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/fcrm:1.57.0-rc2
        imagePullPolicy: Always
        name: configure
        resources: {}
        volumeMounts:
        - mountPath: /home/frappe/frappe-bench/sites
          name: sites-dir
        - mountPath: /home/frappe/frappe-bench/logs
          name: logs
      initContainers:
      - args:
        - chown -R "1000:1000" /home/frappe/frappe-bench/sites /home/frappe/frappe-bench/logs
        command:
        - sh
        - -c
        image: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/fcrm:1.57.0-rc2
        imagePullPolicy: Always
        name: frappe-bench-ownership
        resources: {}
        securityContext:
          runAsUser: 0
        volumeMounts:
        - mountPath: /home/frappe/frappe-bench/sites
          name: sites-dir
        - mountPath: /home/frappe/frappe-bench/logs
          name: logs
      restartPolicy: Never
      securityContext:
        supplementalGroups:
        - 1000
      serviceAccountName: fcrm
      volumes:
      - name: sites-dir
        persistentVolumeClaim:
          claimName: sites
          readOnly: false
      - emptyDir: {}
