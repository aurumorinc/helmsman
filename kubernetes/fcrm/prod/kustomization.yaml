apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Sets the namespace for all resources (except cluster-wide ones like PVs)
namespace: fcrm

# 1. Include all your infrastructure and database manifests
resources:
  - service-account.yaml
  - secret-store.yaml
  - external-secret.yaml
  - persistent-volume.yaml
  - persistent-volume-claim.yaml
  - mariadb.yaml
  - maxscale.yaml
  - user.yaml
  - grant.yaml
  - backup.yaml

# 2. Integrate the Frappe Helm Chart
helmCharts:
  - name: erpnext
    repo: https://helm.erpnext.com
    releaseName: fcrm
    namespace: fcrm
    version: 8.0.8
    valuesFile: values.yaml
    includeCRDs: true

# 3. Patch the Service to add the NEG Annotation (replaces your manual kubectl annotate)
patches:
  - target:
      kind: Service
      name: fcrm
    patch: |-
      - op: add
        path: /metadata/annotations/cloud.google.com~1neg
        value: '{"exposed_ports": {"8080":{}}}'
  - path: patches/deployment-nginx.yaml
    target:
      kind: Deployment
      name: fcrm-nginx
  - path: patches/deployment-gunicorn.yaml
    target:
      kind: Deployment
      name: fcrm-gunicorn
  - target:
      kind: Pod
      name: fcrm-test-connection
    patch: |-
      apiVersion: v1
      kind: Pod
      metadata:
        name: fcrm-test-connection
      $patch: delete