apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: fcrm
  namespace: fcrm
spec:
  # The actual username in the database
  name: fcrm
  mariaDbRef:
    name: mariadb
  passwordSecretKeyRef:
    name: password
    key: fcrm-user-password
  # "%" Allows connection from any IP (fixes the localhost restriction)
  host: "%"
  maxUserConnections: 100