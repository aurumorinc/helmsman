apiVersion: batch/v1
kind: Job
metadata:
  name: ".*"
spec:
  template:
    spec:
      containers:
      - name: migrate
        command: ["bash", "-c"]
        args:
          - >
            set -x;
            
            # We migrate all sites instead of just $SITE_NAME
            bench --site all set-maintenance-mode on;
            bench --site all migrate --skip-failing;
            bench --site all clear-cache;
            bench --site all clear-website-cache;
            bench --site all scheduler enable;
            bench --site all set-maintenance-mode off;