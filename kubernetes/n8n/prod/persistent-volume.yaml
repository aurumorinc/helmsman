apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-data
  namespace: n8n
spec:
  capacity:
    storage: 1Ti # Update this to match your Filestore size
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/n8n
    server: filestore.n8n.asia-south1.prod.capybaara.com