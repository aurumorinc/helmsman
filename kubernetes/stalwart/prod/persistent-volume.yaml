apiVersion: v1
kind: PersistentVolume
metadata:
  name: stalwart-config
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/stalwart/config
    server: filestore.stalwart.asia-south1.prod.aurumor.com