apiVersion: v1
kind: PersistentVolume
metadata:
  name: ntfy-lib
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/ntfy/lib
    server: filestore.ntfy.asia-south1.prod.aurumor.com
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ntfy-cache
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/ntfy/cache
    server: filestore.ntfy.asia-south1.prod.aurumor.com