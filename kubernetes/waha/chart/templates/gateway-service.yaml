apiVersion: v1
kind: Service
metadata:
  # This service takes the standard name so existing Ingress/LB setups point here
  name: {{ include "waha.fullname" . }}
  labels:
    {{- include "waha.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    # Preserve existing NEG annotation if needed, or make it configurable
    cloud.google.com/neg: '{"exposed_ports": {"3000":{}}}'
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "waha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
