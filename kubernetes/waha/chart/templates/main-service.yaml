{{- if .Values.main.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "waha.fullname" . }}-main
  labels:
    {{- include "waha.labels" . | nindent 4 }}
    app.kubernetes.io/component: main
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "waha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: main
{{- end }}
