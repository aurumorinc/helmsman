{{- range .Values.users }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "waha.fullname" $ }}-{{ .name }}
  labels:
    {{- include "waha.labels" $ | nindent 4 }}
    app.kubernetes.io/component: user-{{ .name }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "waha.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: user-{{ .name }}
---
{{- end }}
