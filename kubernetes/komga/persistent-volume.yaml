apiVersion: v1
kind: PersistentVolume
metadata:
  name: komga-config
  namespace: komga
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/komga/config
    server: 10.0.0.2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: komga-data
  namespace: komga
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: regional
  nfs:
    path: /share/resources
    server: 10.0.0.2