apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  labels:
    app: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
      - name: ntfy
        image: binwiederhier/ntfy
        args: ["serve"]
        env:
        - name: TZ
          value: "Asia/Kolkata"
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
              memory: 300Mi
              cpu:  200m
          requests:
              cpu: 150m
              memory: 150Mi
        livenessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: server
          mountPath: "/etc/ntfy/server.yml"
          subPath: "server.yml"
          readOnly: true
        - name: lib
          mountPath: "/var/lib/ntfy"
        - name: cache
          mountPath: "/var/cache/ntfy"
      volumes:
      - name: server
        configMap:
          name: server
      - name: lib
        persistentVolumeClaim:
          claimName: lib
      - name: cache
        persistentVolumeClaim:
          claimName: cache
