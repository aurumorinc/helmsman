# 1. Image Configuration
image:
  repository: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/frappe
  tag: v16.3.0-rc14
  pullPolicy: Always

# 2. Security Context
securityContext:
  capabilities:
    add:
      - CHOWN

# 3. Database Configuration (Connect to MaxScale)
mariadb:
  enabled: false

# MaxScale Service Name in the 'erpnext' namespace
dbHost: maxscale.erpnext.svc.cluster.local
dbPort: 3306
dbRootUser: erpnext

# Use the Secret synced by ExternalSecrets
dbExistingSecret: "password"
dbExistingSecretPasswordKey: "user-password"

# 4. Redis Configuration (GCP Memorystore)
externalRedis:
  cache: "redis://cache.valkey.erpnext.asia-south1.prod.aurumor.com:6379"
  queue: "redis://queue.valkey.erpnext.asia-south1.prod.aurumor.com:6379"

# Disable Dragonfly for Cache
dragonfly-cache:
  enabled: false

# Disable Dragonfly for Queue
dragonfly-queue:
  enabled: false
  
redis-cache:
  enabled: false

redis-queue:
  enabled: false

valkey-cache:
  enabled: false

valkey-queue:
  enabled: false

# 5. Persistence (GCP Filestore NFS)
persistence:
  worker:
    enabled: true
    # Use the PVC created manually for Filestore
    existingClaim: "sites"
    accessModes:
      - ReadWriteMany
  logs:
    # Disable persistent logs to simplify storage, or create a separate PVC if needed
    enabled: false

# 6. Network / LoadBalancer Access
nginx:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPU: 80
  livenessProbe:
    tcpSocket: null
    httpGet:
      path: /api/method/ping
      port: 8080
      httpHeaders:
        - name: Host
          value: erpnext.pennyjaar.com
    initialDelaySeconds: 30
    timeoutSeconds: 240
    periodSeconds: 240
  readinessProbe:
    tcpSocket: null
    httpGet:
      path: /api/method/ping
      port: 8080
      httpHeaders:
        - name: Host
          value: erpnext.pennyjaar.com
    initialDelaySeconds: 30
    timeoutSeconds: 240
    periodSeconds: 240
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"
  service:
    type: ClusterIP
    port: 8080
    
    environment:
    # 0.0.0.0/0 allows Nginx to accept headers from the GCP LB. 
    # For stricter security, you can use GCP IP ranges: "130.211.0.0/22 35.191.0.0/16"
    upstreamRealIPAddress: "130.211.0.0/22 35.191.0.0/16"
    upstreamRealIPHeader: "X-Forwarded-For"
    upstreamRealIPRecursive: "on"

worker:
  gunicorn:
    initContainers:
      - name: populate-assets
        image: "asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/frappe:v16.3.0-rc14"
        imagePullPolicy: Always
        command: ["bash", "-c"]
        args:
          - "cp -R /home/frappe/frappe-bench/sites/assets/* /assets-volume/"
        volumeMounts:
          - name: sites-dir
            mountPath: /assets-volume/
            subPath: assets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
    autoscaling:
      enabled: true
      minReplicas: 2
      targetCPU: 80
    resources:
      requests:
        memory: "512Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
    livenessProbe:
      tcpSocket: null
      httpGet:
        path: /api/method/ping
        port: 8000
        httpHeaders:
          - name: Host
            value: erpnext.pennyjaar.com
      initialDelaySeconds: 30
      timeoutSeconds: 240
      periodSeconds: 240
    readinessProbe:
      tcpSocket: null
      httpGet:
        path: /api/method/ping
        port: 8000
        httpHeaders:
          - name: Host
            value: erpnext.pennyjaar.com
      initialDelaySeconds: 30
      timeoutSeconds: 240
      periodSeconds: 240

  default:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "256Mi"

  short:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "256Mi"

  long:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "256Mi"

  scheduler:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"

socketio:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"

# 7. Job Configuration
jobs:
  # Configures common_site_config.json
  configure:
    enabled: true
    fixVolume: true # Ensures permissions on the NFS share are correct
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"

  # Creates the site and installs apps
  createSite:
    enabled: true
    siteName: "erpnext.pennyjaar.com"
    adminExistingSecret: "password"
    adminExistingSecretKey: "admin-password"
    dbType: "mariadb"
    installApps:
      - erpnext
      - hrms
      - offsite_backups
      - india_compliance
      - print_designer
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"

  # Schema migration for updates
  migrate:
    enabled: true
    siteName: "erpnext.pennyjaar.com"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        
# 8. Ingress (Optional - if using GKE Ingress Controller)
ingress:
  enabled: false 

# 9. Additional Configurations
fullnameOverride: "erpnext"