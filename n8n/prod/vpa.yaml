apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cloud-sql-proxy-vpa
  namespace: n8n
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloud-sql-proxy
  updatePolicy:
    updateMode: Off
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      minAllowed:
        cpu: 50m
        memory: 52Mi
      controlledResources:
      - cpu
      - memory
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: n8n-vpa
  namespace: n8n
spec:
