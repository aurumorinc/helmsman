---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: access-key
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: access-key
    creationPolicy: Owner
  data:
    - secretKey: n8n-external-storage-s3-access-key
      remoteRef:
        key: N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY
    - secretKey: n8n-external-storage-s3-access-secret
      remoteRef:
        key: N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET