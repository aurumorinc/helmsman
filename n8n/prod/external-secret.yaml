apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: key
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: key
    creationPolicy: Owner
  data:
    - secretKey: n8n-encryption-key
      remoteRef:
        key: N8N_ENCRYPTION_KEY

---
apiVersion: external-secrets.io/v1
