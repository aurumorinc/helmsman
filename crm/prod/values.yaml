# 1. Image Configuration
image:
  repository: asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/crm
  tag: latest
  pullPolicy: Always

# 2. Security Context
securityContext:
  capabilities:
    add:
      - CHOWN

# 3. Database Configuration (Connect to MaxScale)
mariadb:
  enabled: false

# MaxScale Service Name in the 'crm' namespace
dbHost: maxscale.crm.svc.cluster.local
dbPort: 3306
dbRootUser: crm

# Use the Secret synced by ExternalSecrets
dbExistingSecret: "password"
dbExistingSecretPasswordKey: "user-password"

# 4. Redis Configuration (GCP Memorystore)
externalRedis:
  cache: "redis://cache.valkey.crm.asia-south1.prod.aurumor.com:6379"
  queue: "redis://queue.valkey.crm.asia-south1.prod.aurumor.com:6379"

# Disable internal Redis and Dragonfly components
dragonfly-cache:
  enabled: false

dragonfly-queue:
  enabled: false
  
redis-cache:
  enabled: false

redis-queue:
  enabled: false

valkey-cache:
  enabled: false

valkey-queue:
  enabled: false

# 5. Persistence (GCP Filestore NFS)
persistence:
  worker:
    enabled: true
    # Use the PVC created manually for Filestore
    existingClaim: "sites"
    accessModes:
      - ReadWriteMany
  logs:
    # Disable persistent logs to simplify storage, or create a separate PVC if needed
    enabled: false

# 6. Network / LoadBalancer Access
nginx:
  # Autoscaling to handle variable load, especially during peak hours or marketing campaigns
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 100
    targetCPU: 80

  # Probes to ensure GCP LB health checks work correctly
  livenessProbe:
    tcpSocket: null
    httpGet:
      path: /api/method/ping
      port: 8080
      httpHeaders:
        - name: Host
          value: crm.pennyjaar.com
    initialDelaySeconds: 30
    timeoutSeconds: 240
    periodSeconds: 240

  readinessProbe:
    tcpSocket: null
    httpGet:
      path: /api/method/ping
      port: 8080
      httpHeaders:
        - name: Host
          value: crm.pennyjaar.com
    initialDelaySeconds: 30
    timeoutSeconds: 240
    periodSeconds: 240

  # Resources to ensure the Nginx Ingress Controller can handle traffic efficiently
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
      
  # NEG Annotations for GCP Load Balancer integration
  service:
    type: ClusterIP
    port: 8080
    
    environment:
    # 0.0.0.0/0 allows Nginx to accept headers from the GCP LB. 
    # For stricter security, you can use GCP IP ranges: "130.211.0.0/22 35.191.0.0/16"
    upstreamRealIPAddress: "130.211.0.0/22 35.191.0.0/16"
    upstreamRealIPHeader: "X-Forwarded-For"
    upstreamRealIPRecursive: "on"

worker:
  gunicorn:

    # initContainer to copy assets from the image to the NFS share before the worker starts
    initContainers:
      - name: populate-assets
        image: "asia-south1-docker.pkg.dev/au-heimdall-prod-r8oa2r/remote-github-aquiveal-artifact-registry/aquiveal/crm:latest"
        imagePullPolicy: Always
        command: ["bash", "-c"]
        args:
          - "cp -R /home/frappe/frappe-bench/sites/assets/* /assets-volume/"
        volumeMounts:
          - name: sites-dir
            mountPath: /assets-volume/
            subPath: assets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

    # Autoscaling to handle variable load
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 100
      targetCPU: 80

    # Resources to ensure the worker can handle application load efficiently
    resources:
      requests:
        memory: "512Mi"
        cpu: "50m"
      limits:
        memory: "2Gi"
        cpu: "200m"

    # Probes to ensure the worker is healthy and ready to serve traffic, which also helps GCP LB health checks
    livenessProbe:
      tcpSocket: null
      httpGet:
        path: /api/method/ping
        port: 8000
        httpHeaders:
          - name: Host
            value: crm.pennyjaar.com
      initialDelaySeconds: 30
      timeoutSeconds: 240
      periodSeconds: 240

    readinessProbe:
      tcpSocket: null
      httpGet:
        path: /api/method/ping
        port: 8000
        httpHeaders:
          - name: Host
            value: crm.pennyjaar.com
      initialDelaySeconds: 30
      timeoutSeconds: 240
      periodSeconds: 240

  # Resource configurations for different worker types
  default:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  short:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  long:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  scheduler:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "400m"

  socketio:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# 7. Job Configuration
jobs:
  # Configures common_site_config.json
  configure:
    enabled: true
    fixVolume: true # Ensures permissions on the NFS share are correct
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
        cpu: "200m"

  # Creates the site and installs apps
  createSite:
    enabled: true
    siteName: "crm.pennyjaar.com, crm.capybaara.com"
    apps: "crm, frappe_crm, frappe_chatwoot"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
        cpu: "200m"

  # Schema migration for updates
  migrate:
    enabled: true
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# 8. Ingress (Optional - if using GKE Ingress Controller)
ingress:
  enabled: false 

# 9. Additional Configurations
fullnameOverride: "crm"