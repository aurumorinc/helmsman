apiVersion: batch/v1
kind: Job
metadata:
  name: ".*"
spec:
  template:
    spec:
      containers:
      - name: migrate
        command: ["bash", "-c"]
        args:
          - >
            ls -1 sites | grep -vE "^(assets|apps.txt|common_site_config.json)$" | while read -r site; do
              bench --site "$site" set-maintenance-mode on;
              bench --site "$site" migrate --skip-failing;
              bench --site "$site" clear-cache;
              bench --site "$site" clear-website-cache;
              bench --site "$site" scheduler enable;
              bench --site "$site" set-maintenance-mode off;
            done
