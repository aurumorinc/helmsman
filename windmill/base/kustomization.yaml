apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: windmill

resources:
  - vpa.yaml
  - namespace.yaml
  - service-account.yaml
  - secret-store.yaml
  - external-secret.yaml
  - deployment.yaml
  - service.yaml
  - scaled-object.yaml
  - trigger-authentication.yaml

helmCharts:
  - name: windmill
    repo: https://windmill-labs.github.io/windmill-helm-charts/
    releaseName: windmill
    namespace: windmill
    version: 4.0.91
    valuesFile: values.yaml
    includeCRDs: true

patches:
  - path: patches/deployment.yaml
  - path: patches/worker-patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      labelSelector: "app=windmill-workers"
