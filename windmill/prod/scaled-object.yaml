apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: default
  namespace: windmill
spec:
  scaleTargetRef:
    name: windmill-workers-default
    kind: Deployment
    apiVersion: apps/v1
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 30
  triggers:
    - type: postgresql
      metadata:
        targetQueryValue: "1"
        query: "SELECT count(*) FROM v2_job_queue WHERE tag IN ('deno', 'python3', 'go', 'bash', 'powershell', 'dependency', 'flow', 'hub', 'other', 'bun', 'php', 'rust', 'ansible', 'csharp', 'nu', 'java', 'duckdb', 'ruby') AND suspend = 0 AND (running = true OR (running = false AND scheduled_for <= now()))"
      authenticationRef:
        name: windmill
---
