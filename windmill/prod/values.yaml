# Windmill Production Values
# Reference: windmill/prod/charts/windmill-4.0.91/windmill/values.yaml

# 1. Disable embedded databases
postgresql:
  enabled: false

minio:
  enabled: false

# 2. Database Configuration (Connecting to external Postgres via Secret)
windmill:
  tag: "1.651.1"
  appReplicas: 0
  databaseUrlSecretName: "database"
  databaseUrlSecretKey: "database-url"
  
  # 6. Enable Windmill Extra (LSP) and configure NEG
  extraReplicas: 1
  windmillExtra:
    service:
      annotations:
        cloud.google.com/neg: '{"exposed_ports": {"3001":{}, "3002":{}, "3003":{}}}'
    podSecurityContext:
      runAsUser: 1001
      runAsNonRoot: true
  
  # 7. Security Context Overrides for GKE Autopilot
  # GKE Autopilot disallows privileged containers and runAsUser: 0 (root)
  workerGroups:
    - name: "default"
      replicas: 1
      privileged: false
      disableUnsharePid: true
      terminationGracePeriodSeconds: 600
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          memory: "512Mi"
      autoscaling:
        enabled: false
      podSecurityContext:
        runAsUser: 1001
        runAsNonRoot: true
    - name: "native"
      replicas: 1
      privileged: false
      disableUnsharePid: true
      terminationGracePeriodSeconds: 600
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          memory: "512Mi"
      autoscaling:
        enabled: false
      podSecurityContext:
        runAsUser: 1001
        runAsNonRoot: true
    - name: "browser"
      replicas: 1
      privileged: false
      disableUnsharePid: true
      terminationGracePeriodSeconds: 600
      resources:
        requests:
          cpu: "200m"
          memory: "1Gi"
        limits:
          memory: "1Gi"
      autoscaling:
        enabled: false
      podSecurityContext:
        runAsUser: 1001
        runAsNonRoot: true
        
  app:
    podSecurityContext:
      runAsUser: 1001
      runAsNonRoot: true

  indexer:
    podSecurityContext:
      runAsUser: 1001
      runAsNonRoot: true
  
  extra:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "256Mi"

# 3. Disable Enterprise features
enterprise:
  enabled: false

# 4. Ingress Configuration
ingress:
  enabled: false
  className: "gce"
  annotations:
    kubernetes.io/ingress.class: "gce"

