apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-sql-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-sql-proxy
  template:
    metadata:
      labels:
        app: cloud-sql-proxy
    spec:
      serviceAccountName: cloud-sql-client
      containers:
      - name: proxy
        # The official Google Cloud SQL Proxy image
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
        args:
          - "--private-ip"
          - "--address=0.0.0.0"
          - "--port=5432"
          - "au-windmill-prod-264762:asia-south1:asia-south1-postgres-sql"
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"